                class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-2 text-gray-800 dark:text-gray-100 placeholder-gray-400 max-h-40" 
                placeholder="اكتب رسالتك هنا..."></textarea>

            <button id="sendBtn" class="p-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl shadow-lg shadow-primary-600/30 transition-all active:scale-95 flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-6 h-6 transform rotate-180 rtl:rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2">يمكن للذكاء الاصطناعي ارتكاب الأخطاء. يرجى التحقق من المعلومات المهمة.</p>
    </footer>

    <script>
        /**
         * Constants and Configuration
         */
        const CONFIG = {
            MODEL_ID: "llama-3.3-70b-versatile",
            GROQ_API_URL: "https://api.groq.com/openai/v1/chat/completions",
            ELEVEN_API_URL: "https://api.elevenlabs.io/v1/text-to-speech",
            VOICE_ID: "pNInz6obpgDQGcFmaJgB", // Zayd Voice
            SYSTEM_PROMPT: `
أنت مساعد ذكي ومحلل خبير تتحدث اللغة العربية بطلاقة. 
- قدم ردودك بتنسيق Markdown منظم وجميل.
- استخدم العناوين (Headings) والنقاط (Bullet Points) لتسهيل القراءة.
- إذا كتبت كوداً برمجياً، ضعه دائماً داخل كتل الكود \`\`\` مع تحديد اللغة.
- كن دقيقاً، مهنياً، وموجزاً في الإجابة.
            `
        };

        /**
         * Storage Service
         * Handles secure local storage operations.
         */
        class StorageService {
            static get(key) {
                return localStorage.getItem(key);
            }

            static set(key, value) {
                if (value) localStorage.setItem(key, value);
            }

            static getAPIKey(service) {
                return localStorage.getItem(`${service}_api_key`);
            }
        }

        /**
         * UI Service
         * Handles DOM manipulations and UI updates.
         */
        class UIService {
            constructor() {
                this.elements = {
                    chatContainer: document.getElementById('chatContainer'),
                    userInput: document.getElementById('userInput'),
                    typingIndicator: document.getElementById('typingIndicator'),
                    welcomeMsg: document.getElementById('welcomeMsg'),
                    sendBtn: document.getElementById('sendBtn'),
                    voiceBtn: document.getElementById('voiceBtn'),
                    themeIcon: document.getElementById('themeIcon'),
                    groqInput: document.getElementById('groq_key'),
                    elevenInput: document.getElementById('elevenlabs_key'),
                    saveKeysBtn: document.getElementById('saveKeysBtn'),
                    themeToggleBtn: document.getElementById('themeToggleBtn')
                };
            }

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                StorageService.set('theme', isDark ? 'dark' : 'light');
                this.updateThemeIcon(isDark);
            }

            initTheme() {
                const savedTheme = StorageService.get('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
                
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                
                this.updateThemeIcon(isDark);
            }

            updateThemeIcon(isDark) {
                const moonPath = "M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z";
                const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z";
                
                this.elements.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${isDark ? sunPath : moonPath}"></path>`;
            }

            appendMessage(role, content, msgId = null) {
                this.elements.welcomeMsg.style.display = 'none';
                const div = document.createElement('div');
                
                if (role === 'user') {
                    div.className = "flex justify-start mb-6 animate-[fadeIn_0.3s_ease-out]";
                    div.innerHTML = `<div class="bg-primary-600 text-white px-5 py-3 rounded-2xl rounded-br-none max-w-[90%] md:max-w-[80%] shadow-md text-lg leading-relaxed break-words whitespace-pre-wrap">${this.escapeHtml(content)}</div>`;
                } else {
                    const htmlContent = marked.parse(content);
                    div.className = "flex flex-col items-end mb-8 animate-[fadeIn_0.3s_ease-out] w-full";
                    div.innerHTML = `
                        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-100 px-6 py-5 rounded-2xl rounded-bl-none max-w-[95%] md:max-w-[85%] shadow-sm prose prose-lg dark:prose-invert prose-p:my-2 prose-headings:text-primary-600 dark:prose-headings:text-primary-400 w-full" id="${msgId}">
                            ${htmlContent}
                        </div>
                        <div class="flex gap-2 mt-2 mr-2 opacity-100 transition-opacity">
                            ${this.createActionButton('📋', 'نسخ', `window.utils.copy('${msgId}')`)}
                            ${this.createActionButton('📱', 'واتساب', `window.utils.shareWA('${msgId}')`, 'green')}
                            ${this.createActionButton('🐦', 'تويتر', `window.utils.shareTwitter('${msgId}')`, 'blue')}
                        </div>
                    `;
                }
                
                this.elements.chatContainer.insertBefore(div, this.elements.typingIndicator);
                this.scrollToBottom();
            }

            appendError(message) {
                const div = document.createElement('div');
                div.className = "flex justify-center mb-6 w-full";
                div.innerHTML = `
                    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                        <span>⚠️ ${this.escapeHtml(message)}</span>
                    </div>
                `;
                this.elements.chatContainer.insertBefore(div, this.elements.typingIndicator);
                this.scrollToBottom();
            }

            createActionButton(icon, label, action, color = 'gray') {
                const colors = {
                    gray: 'bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300',
                    green: 'bg-green-50 dark:bg-green-900/20 hover:bg-green-100 dark:hover:bg-green-900/40 text-green-600 dark:text-green-400',
                    blue: 'bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40 text-blue-500 dark:text-blue-400'
                };
                return `<button onclick="${action}" class="text-xs flex items-center gap-1 px-3 py-1.5 rounded-full ${colors[color]} transition-colors"><span>${icon}</span> ${label}</button>`;
            }

            setLoading(isLoading) {
                if (isLoading) {
                    this.elements.typingIndicator.classList.remove('hidden');
                    this.elements.typingIndicator.style.display = 'flex';
                    this.elements.sendBtn.disabled = true;
                } else {
                    this.elements.typingIndicator.classList.add('hidden');
                    this.elements.typingIndicator.style.display = 'none';
                    this.elements.sendBtn.disabled = false;
                }
                this.scrollToBottom();
            }

            scrollToBottom() {
                this.elements.chatContainer.scrollTop = this.elements.chatContainer.scrollHeight;
            }

            showToast(message) {
                const toast = document.createElement('div');
                toast.className = "fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-[fadeIn_0.3s_ease-out] flex items-center gap-2";
                toast.innerHTML = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }

            escapeHtml(text) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, m => map[m]);
            }
        }

        /**
         * API Service
         * Handles external API communications.
         */
        class APIService {
            static async chat(messages, apiKey) {
                const response = await fetch(CONFIG.GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL_ID,
                        messages: messages,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'فشل الاتصال بخدمة Groq');
                }

                return await response.json();
            }

            static async textToSpeech(text, apiKey) {
                if (!apiKey) return;
                
                // Clean text for better speech synthesis
                const cleanText = text.replace(/[*#_`~]/g, '');
                
                try {
                    const response = await fetch(`${CONFIG.ELEVEN_API_URL}/${CONFIG.VOICE_ID}`, {
                        method: 'POST',
                        headers: {
                            'xi-api-key': apiKey,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: cleanText,
                            model_id: "eleven_multilingual_v2",
                            voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const audio = new Audio(URL.createObjectURL(blob));
                        audio.play();
                    }
                } catch (e) {
                    console.error("TTS Error:", e);
                }
            }
        }

        /**
         * Main Application Controller
         */
        class ChatController {
            constructor() {
                this.ui = new UIService();
                this.history = []; // Conversation history
                this.recognition = null;
                this.isRecording = false;

                this.init();
            }

            init() {
                // Load saved keys
                const gKey = StorageService.getAPIKey('groq');
                const eKey = StorageService.getAPIKey('eleven');
                if (gKey) this.ui.elements.groqInput.value = gKey;
                if (eKey) this.ui.elements.elevenInput.value = eKey;

                // Initialize Theme
                this.ui.initTheme();

                // Event Listeners
                this.ui.elements.saveKeysBtn.addEventListener('click', () => this.saveKeys());
                this.ui.elements.themeToggleBtn.addEventListener('click', () => this.ui.toggleTheme());
                this.ui.elements.sendBtn.addEventListener('click', () => this.handleSend());
                this.ui.elements.voiceBtn.addEventListener('click', () => this.toggleDictation());
                
                this.ui.elements.userInput.addEventListener('input', (e) => {
                    e.target.style.height = 'auto';
                    e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                });

                this.ui.elements.userInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.handleSend();
                    }
                });

                // Expose utils for global access (onclick handlers)
                window.utils = {
                    copy: this.copyToClipboard.bind(this),
                    shareWA: this.shareToWhatsApp.bind(this),
                    shareTwitter: this.shareToTwitter.bind(this)
                };
            }

            saveKeys() {
                const gKey = this.ui.elements.groqInput.value.trim();
                const eKey = this.ui.elements.elevenInput.value.trim();

                if (!gKey.startsWith('gsk_')) {
                    alert('يرجى إدخال مفتاح Groq صحيح (يبدأ بـ gsk_)');
                    return;
                }

                StorageService.set('groq_api_key', gKey);
                StorageService.set('eleven_api_key', eKey);
                this.ui.showToast('تم حفظ الإعدادات بنجاح! ✅');
            }

            async handleSend() {
                const text = this.ui.elements.userInput.value.trim();
                const apiKey = this.ui.elements.groqInput.value.trim();

                if (!text) return;
                if (!apiKey) {
                    alert('يرجى إدخال مفتاح Groq API أولاً.');
                    return;
                }

                // UI Updates
                this.ui.appendMessage('user', text);
                this.ui.elements.userInput.value = '';
                this.ui.elements.userInput.style.height = 'auto';
                this.ui.setLoading(true);

                // Prepare Context
                const messages = [
                    { role: "system", content: CONFIG.SYSTEM_PROMPT },
                    ...this.history.slice(-10), // Keep last 10 messages for context
                    { role: "user", content: text }
                ];

                try {
                    const data = await APIService.chat(messages, apiKey);
                    const aiReply = data.choices[0].message.content;
                    const msgId = 'msg-' + Date.now();

                    // Update History
                    this.history.push({ role: "user", content: text });
                    this.history.push({ role: "assistant", content: aiReply });

                    this.ui.appendMessage('assistant', aiReply, msgId);
                    
                    // Trigger Voice
                    const elevenKey = this.ui.elements.elevenInput.value.trim();
                    if (elevenKey) {
                        APIService.textToSpeech(aiReply, elevenKey);
                    }

                } catch (error) {
                    this.ui.appendError(error.message);
                } finally {
                    this.ui.setLoading(false);
                }
            }

            toggleDictation() {
                if (!('webkitSpeechRecognition' in window)) {
                    alert("المتصفح لا يدعم التعرف الصوتي.");
                    return;
                }

                if (this.isRecording) {
                    this.recognition.stop();
                    return;
                }

                this.recognition = new webkitSpeechRecognition();
                this.recognition.lang = "ar-SA";
                this.recognition.continuous = false;

                this.recognition.onstart = () => {
                    this.isRecording = true;
                    this.ui.elements.voiceBtn.classList.add('text-red-500', 'recording-pulse');
                };

                this.recognition.onend = () => {
                    this.isRecording = false;
                    this.ui.elements.voiceBtn.classList.remove('text-red-500', 'recording-pulse');
                };

                this.recognition.onresult = (e) => {
                    const transcript = e.results[0][0].transcript;
                    const input = this.ui.elements.userInput;
                    input.value += (input.value ? ' ' : '') + transcript;
                    input.focus();
                };

                this.recognition.start();
            }

            // Helper Utilities
            copyToClipboard(id) {
                const text = document.getElementById(id).innerText;
                navigator.clipboard.writeText(text).then(() => this.ui.showToast('تم نسخ النص! 📋'));
            }

            shareToWhatsApp(id) {
                const text = document.getElementById(id).innerText;
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text.substring(0, 2000))}...`, '_blank');
            }

            shareToTwitter(id) {
                const text = document.getElementById(id).innerText;
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text.substring(0, 280))}`, '_blank');
            }
        }

        // Initialize App
        window.onload = () => {
            new ChatController();
        };
    </script>
</body>
</html>
